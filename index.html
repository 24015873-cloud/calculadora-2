<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Calculadoras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Transiciones globales */
        body { 
            transition: background-color 0.5s ease, color 0.5s ease;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .calc-container { 
            transition: all 0.4s ease;
        }

        /* 1. NEUMORPHISM */
        .theme-neumorphic { background-color: #e0e5ec; color: #444; }
        .theme-neumorphic .calc-body {
            background: #e0e5ec;
            border-radius: 30px;
            box-shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff;
            padding: 25px;
        }
        .theme-neumorphic .btn-calc {
            background: #e0e5ec;
            box-shadow: 6px 6px 12px #bec3c9, -6px -6px 12px #ffffff;
            border-radius: 15px;
            color: #444;
        }
        .theme-neumorphic .btn-calc:active {
            box-shadow: inset 4px 4px 8px #bec3c9, inset -4px -4px 8px #ffffff;
        }
        .theme-neumorphic .display-area { color: #2d3436; }

        /* 2. CYBERPUNK */
        .theme-cyberpunk { background-color: #0d0221; color: #00ff41; }
        .theme-cyberpunk .calc-body {
            background: #0d0221;
            border: 3px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
            border-radius: 5px;
            padding: 25px;
        }
        .theme-cyberpunk .btn-calc {
            background: #1a0842;
            border: 1px solid #00ffff;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            border-radius: 0;
        }
        .theme-cyberpunk .btn-calc:hover { background: #00ffff; color: #000; }
        .theme-cyberpunk .display-area { text-shadow: 0 0 10px #00ff41; }

        /* 3. GLASSMORPHISM */
        .theme-glass { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .theme-glass .calc-body {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 25px;
        }
        .theme-glass .btn-calc {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 15px;
        }
        .theme-glass .btn-calc:hover { background: rgba(255, 255, 255, 0.25); }

        /* 4. MINIMALISTA (iOS Estilo) */
        .theme-minimal { background-color: #ffffff; color: #000; }
        .theme-minimal .calc-body {
            background: #000000;
            border-radius: 40px;
            padding: 20px;
        }
        .theme-minimal .btn-calc {
            background: #333333;
            color: white;
            border-radius: 50%;
            font-size: 1.5rem;
        }
        .theme-minimal .btn-op { background: #ff9f0a; }
        .theme-minimal .btn-special { background: #a5a5a5; color: black; }
        .theme-minimal .display-area { color: white; padding-bottom: 10px; }
    </style>
</head>
<body class="theme-neumorphic">

    <!-- Selector de Estilos -->
    <div class="mb-8 flex flex-wrap justify-center gap-2 p-2 bg-black/5 rounded-full backdrop-blur-sm">
        <button onclick="setTheme('neumorphic')" class="px-4 py-2 rounded-full bg-white/80 text-gray-800 text-xs font-bold hover:scale-105 transition">Neumorfismo</button>
        <button onclick="setTheme('cyberpunk')" class="px-4 py-2 rounded-full bg-purple-900 text-cyan-300 text-xs font-bold hover:scale-105 transition">Cyberpunk</button>
        <button onclick="setTheme('glass')" class="px-4 py-2 rounded-full bg-indigo-500 text-white text-xs font-bold hover:scale-105 transition">Glassmorfismo</button>
        <button onclick="setTheme('minimal')" class="px-4 py-2 rounded-full bg-black text-white text-xs font-bold hover:scale-105 transition">Minimalista</button>
    </div>

    <!-- Estructura de la Calculadora -->
    <div class="calc-container w-full max-w-[340px]">
        <div class="calc-body shadow-2xl">
            <!-- Pantalla de visualización -->
            <div class="display-area flex flex-col items-end justify-end h-24 mb-4 overflow-hidden">
                <div id="history" class="text-sm opacity-50 pr-2 h-6 truncate w-full text-right"></div>
                <div id="display" class="text-5xl font-light pr-2 truncate w-full text-right">0</div>
            </div>

            <!-- Teclado -->
            <div class="grid grid-cols-4 gap-3">
                <!-- Fila 1 -->
                <button onclick="pressAction('AC')" class="btn-calc btn-special aspect-square flex items-center justify-center font-semibold text-lg">AC</button>
                <button onclick="pressAction('DEL')" class="btn-calc btn-special aspect-square flex items-center justify-center font-semibold text-lg">←</button>
                <button onclick="pressAction('%')" class="btn-calc btn-special aspect-square flex items-center justify-center font-semibold text-lg">%</button>
                <button onclick="pressOp('/')" class="btn-calc btn-op aspect-square flex items-center justify-center font-bold text-2xl">÷</button>
                
                <!-- Fila 2 -->
                <button onclick="pressNum('7')" class="btn-calc aspect-square flex items-center justify-center text-xl">7</button>
                <button onclick="pressNum('8')" class="btn-calc aspect-square flex items-center justify-center text-xl">8</button>
                <button onclick="pressNum('9')" class="btn-calc aspect-square flex items-center justify-center text-xl">9</button>
                <button onclick="pressOp('*')" class="btn-calc btn-op aspect-square flex items-center justify-center font-bold text-2xl">×</button>
                
                <!-- Fila 3 -->
                <button onclick="pressNum('4')" class="btn-calc aspect-square flex items-center justify-center text-xl">4</button>
                <button onclick="pressNum('5')" class="btn-calc aspect-square flex items-center justify-center text-xl">5</button>
                <button onclick="pressNum('6')" class="btn-calc aspect-square flex items-center justify-center text-xl">6</button>
                <button onclick="pressOp('-')" class="btn-calc btn-op aspect-square flex items-center justify-center font-bold text-2xl">-</button>
                
                <!-- Fila 4 -->
                <button onclick="pressNum('1')" class="btn-calc aspect-square flex items-center justify-center text-xl">1</button>
                <button onclick="pressNum('2')" class="btn-calc aspect-square flex items-center justify-center text-xl">2</button>
                <button onclick="pressNum('3')" class="btn-calc aspect-square flex items-center justify-center text-xl">3</button>
                <button onclick="pressOp('+')" class="btn-calc btn-op aspect-square flex items-center justify-center font-bold text-2xl">+</button>
                
                <!-- Fila 5 -->
                <button onclick="pressNum('0')" class="btn-calc col-span-2 rounded-full flex items-center justify-center text-xl">0</button>
                <button onclick="pressNum('.')" class="btn-calc aspect-square flex items-center justify-center text-xl">.</button>
                <button onclick="solve()" class="btn-calc btn-op aspect-square flex items-center justify-center font-bold text-2xl">=</button>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');
        
        let current = '0';
        let previous = '';
        let operation = null;
        let shouldReset = false;

        // Cambiar Temas
        function setTheme(themeName) {
            document.body.className = 'theme-' + themeName;
        }

        // Manejo de Números
        function pressNum(n) {
            if (current === '0' || shouldReset) {
                current = n;
                shouldReset = false;
            } else {
                if (n === '.' && current.includes('.')) return;
                current += n;
            }
            updateDisplay();
        }

        // Manejo de Operaciones
        function pressOp(op) {
            if (operation !== null) solve();
            previous = current;
            operation = op;
            history.innerText = `${previous} ${getSymbol(op)}`;
            shouldReset = true;
        }

        // Acciones Especiales
        function pressAction(type) {
            if (type === 'AC') {
                current = '0';
                previous = '';
                operation = null;
                history.innerText = '';
            } else if (type === 'DEL') {
                if (current.length > 1) {
                    current = current.slice(0, -1);
                } else {
                    current = '0';
                }
            } else if (type === '%') {
                current = (parseFloat(current) / 100).toString();
            }
            updateDisplay();
        }

        // Calcular Resultado
        function solve() {
            if (operation === null || shouldReset) return;
            
            let result;
            const a = parseFloat(previous);
            const b = parseFloat(current);
            
            switch(operation) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': 
                    if (b === 0) {
                        alert("No se puede dividir por cero");
                        pressAction('AC');
                        return;
                    }
                    result = a / b; 
                    break;
            }
            
            history.innerText = `${a} ${getSymbol(operation)} ${b} =`;
            current = (Math.round(result * 1000000) / 1000000).toString();
            operation = null;
            shouldReset = true;
            updateDisplay();
        }

        function getSymbol(op) {
            if (op === '*') return '×';
            if (op === '/') return '÷';
            return op;
        }

        function updateDisplay() {
            display.innerText = current;
        }

        // Soporte Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') pressNum(e.key);
            if (e.key === '.') pressNum('.');
            if (e.key === 'Enter' || e.key === '=') solve();
            if (e.key === 'Backspace') pressAction('DEL');
            if (e.key === 'Escape') pressAction('AC');
            if (['+', '-', '*', '/'].includes(e.key)) pressOp(e.key);
        });
    </script>
</body>
</html>
